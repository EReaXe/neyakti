<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıt Ol | Kaç Yaktı?</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <main class="auth-container">
    <section class="auth-card">
      <div class="auth-logo">⛽</div>
      <h1>Hesap oluştur</h1>
      <p class="auth-description">Yakıt takibine her cihazdan eriş.</p>

      <form id="registerForm">
        <label>Ad soyad<input id="registerName" type="text" maxlength="80" autocomplete="name" required></label>
        <label>E-posta<input id="registerEmail" type="email" autocomplete="email" required></label>
        <label>Şifre<input id="registerPassword" type="password" autocomplete="new-password" minlength="6" required></label>
        <label>Şifre tekrarı<input id="registerPasswordConfirm" type="password" autocomplete="new-password" minlength="6" required></label>
        <button class="button button-primary full-width" type="submit">Kayıt ol</button>
      </form>

      <p id="authMessage" class="auth-message"></p>
      <p class="auth-switch">Zaten hesabın var mı? <a href="login.html">Giriş yap</a></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
