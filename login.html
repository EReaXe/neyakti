<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap | Kaç Yaktı?</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <main class="auth-container">
    <section class="auth-card">
      <div class="auth-logo">⛽</div>
      <h1>Giriş yap</h1>
      <p class="auth-description">Araç ve yakıt kayıtlarına ulaş.</p>

      <form id="loginForm">
        <label>E-posta<input id="loginEmail" type="email" autocomplete="email" required></label>
        <label>Şifre<input id="loginPassword" type="password" autocomplete="current-password" minlength="6" required></label>
        <button class="button button-primary full-width" type="submit">Giriş yap</button>
      </form>

      <p id="authMessage" class="auth-message"></p>
      <p class="auth-switch">Hesabın yok mu? <a href="register.html">Kayıt ol</a></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
